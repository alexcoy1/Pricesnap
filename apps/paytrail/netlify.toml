# PayTrail — separate Netlify site (NOT the PriceSnap root deploy).
# Netlify UI: Base directory = apps/paytrail

[build]
  command = "npm install && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[functions."extract-invoice"]
  timeout = 26

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888
  autoLaunch = true

# Claude invoice extraction (must be before SPA fallback)
[[redirects]]
  from = "/api/ai/extract-invoice"
  to = "/.netlify/functions/extract-invoice"
  status = 200

[[redirects]]
  from = "/api/ai/match-order"
  to = "/.netlify/functions/match-order"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
